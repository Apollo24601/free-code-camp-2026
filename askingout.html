<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be My Girl</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffeef5;
      margin: 0;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 350px;
    }
    h1 {
      color: #ff4d88;
    }
    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .yes {
      background: #ff4d88;
      color: white;
    }
    .no {
      background: #ddd;
    }
  @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
    .no:hover {
      animation: shake 0.4s ease-in-out infinite;
    }
  .yes:hover {
      transform: scale(1.2);
      transition: transform 0.2s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Will you be my partner? 💕</h1>
    <button class="yes" onclick="alert('Yay! ❤️')">Yes</button>
    <button class="no" onclick="alert('I am holding you at gunpoint bro')">No</button>
  </div>
</body>
</html>
